<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Driving Quiz | 日本運転免許クイズ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">

        :root { --pri:#1a2a4a; --acc:#c8a45c; --ok:#2e7d32; --ng:#c62828; --bg:#f5f6fa; --white:#fff; --gray:#666; --sh:0 4px 16px rgba(0,0,0,.08); }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Noto Sans JP','Noto Sans',sans-serif;background:var(--bg);color:#333;line-height:1.7;-webkit-tap-highlight-color:transparent}
        .hd{background:var(--pri);color:var(--white);padding:14px 16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
        .hd h1{font-size:1.15rem;letter-spacing:.03em}
        .hd-sub{display:flex;justify-content:center;align-items:center;gap:12px;margin-top:6px}
        .lang-sel{background:rgba(255,255,255,.15);color:var(--white);border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 8px;font-size:.8rem;font-family:inherit;cursor:pointer}
        .lang-sel option{color:#333;background:var(--white)}
        .tabs{display:flex;background:var(--white);box-shadow:var(--sh);position:sticky;top:56px;z-index:99;overflow-x:auto;-webkit-overflow-scrolling:touch}
        .tab{flex:1;min-width:0;padding:12px 6px;border:none;background:none;font-size:.78rem;font-family:inherit;cursor:pointer;color:var(--gray);border-bottom:3px solid transparent;white-space:nowrap;transition:.3s}
        .tab.on{color:var(--pri);border-bottom-color:var(--acc);font-weight:700}
        .ct{max-width:960px;margin:0 auto;padding:20px 14px}
        .tc{display:none}.tc.on{display:block}
        /* Signs */
        .cat-title{font-size:1.1rem;color:var(--pri);border-left:4px solid var(--acc);padding-left:10px;margin:24px 0 14px}
        .sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px}
        .sc{background:var(--white);border-radius:10px;padding:10px 6px;text-align:center;box-shadow:var(--sh);cursor:pointer;transition:transform .2s}
        .sc:hover{transform:translateY(-2px)}
        .sc .sn{font-size:.68rem;font-weight:500;margin-top:6px;line-height:1.3}
        .sc .se{font-size:.6rem;color:var(--gray)}
        /* CSS Signs */
        .sign{width:64px;height:64px;margin:0 auto;display:flex;align-items:center;justify-content:center;font-weight:700;position:relative}
        .sign-circle{border-radius:50%;border:4px solid #d32f2f;background:var(--white)}
        .sign-circle-blue{border-radius:50%;border:4px solid #1565c0;background:#1565c0;color:var(--white)}
        .sign-circle-red-fill{border-radius:50%;background:#d32f2f;color:var(--white);border:3px solid #b71c1c}
        .sign-tri{width:0;height:0;border-left:34px solid transparent;border-right:34px solid transparent;border-top:60px solid #d32f2f;position:relative}
        .sign-tri::after{content:attr(data-text);position:absolute;top:-52px;left:50%;transform:translateX(-50%);color:var(--white);font-size:.7rem;font-weight:700;white-space:nowrap}
        .sign-diamond{width:48px;height:48px;background:#f9a825;border:3px solid #f57f17;transform:rotate(45deg);display:flex;align-items:center;justify-content:center}
        .sign-diamond .sd-inner{transform:rotate(-45deg);font-size:.55rem;color:#333;text-align:center;line-height:1.2}
        .sign-rect{border-radius:4px;background:#1565c0;color:var(--white);font-size:.6rem;padding:4px}
        .sign-rect-green{border-radius:4px;background:#2e7d32;color:var(--white);font-size:.55rem;padding:4px}
        .sign-aux{border:2px solid #333;border-radius:2px;background:var(--white);font-size:.5rem;padding:4px;width:auto;height:auto}
        .sign-slash{position:relative}.sign-slash::after{content:'';position:absolute;top:8px;left:8px;width:48px;height:3px;background:#d32f2f;transform:rotate(-45deg);transform-origin:center}
        .sign-cross{position:relative}.sign-cross::after{content:'';position:absolute;width:48px;height:3px;background:#d32f2f;transform:rotate(-45deg)}.sign-cross::before{content:'';position:absolute;width:48px;height:3px;background:#d32f2f;transform:rotate(45deg)}
        .sign-inner{font-size:.55rem;text-align:center;line-height:1.2;color:#1565c0}
        .sign-inner-w{font-size:.55rem;text-align:center;line-height:1.2;color:var(--white)}
        .sign-big{width:100px;height:100px;font-size:1rem}
        .sign-big .sign-inner,.sign-big .sign-inner-w{font-size:.8rem}
        /* Quiz */
        .qh{text-align:center;margin-bottom:20px}
        .qh h2{font-size:1.2rem;color:var(--pri)}
        .qh p{color:var(--gray);font-size:.85rem;margin-top:4px}
        .modes{display:flex;justify-content:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
        .mbtn{padding:8px 18px;border:2px solid var(--pri);border-radius:20px;background:var(--white);color:var(--pri);font-family:inherit;font-size:.82rem;cursor:pointer;transition:.3s}
        .mbtn:hover,.mbtn.on{background:var(--pri);color:var(--white)}
        .prog{background:var(--white);border-radius:10px;padding:12px 16px;margin-bottom:16px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
        .pbar{flex:1;min-width:120px;height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden}
        .pbar-in{height:100%;background:linear-gradient(90deg,var(--acc),#e8d5a0);border-radius:3px;transition:width .4s}
        .scr{font-weight:700;color:var(--pri);font-size:.9rem}
        .qc{background:var(--white);border-radius:14px;padding:24px 18px;box-shadow:var(--sh);margin-bottom:16px}
        .qn{display:inline-block;background:var(--pri);color:var(--white);padding:3px 12px;border-radius:14px;font-size:.75rem;font-weight:700;margin-bottom:12px}
        .qi{text-align:center;margin:16px 0}
        .qt{font-size:.95rem;font-weight:500;margin-bottom:16px;line-height:1.8}
        .opts{display:flex;flex-direction:column;gap:8px}
        .ob{padding:12px 14px;border:2px solid #e0e0e0;border-radius:8px;background:var(--white);font-family:inherit;font-size:.88rem;cursor:pointer;text-align:left;transition:.3s;display:flex;align-items:center;gap:10px}
        .ob:hover{border-color:var(--pri);background:rgba(26,42,74,.03)}
        .ob.ok{border-color:var(--ok);background:#e8f5e9;color:var(--ok);font-weight:700}
        .ob.ng{border-color:var(--ng);background:#ffebee;color:var(--ng)}
        .ol{width:26px;height:26px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0}
        .ob.ok .ol{background:var(--ok);color:var(--white)}
        .ob.ng .ol{background:var(--ng);color:var(--white)}
        .exp{margin-top:14px;padding:14px;background:#fff8e1;border-radius:8px;border-left:4px solid var(--acc);display:none;font-size:.85rem;line-height:1.8}
        .exp.on{display:block}
        .nbtn{display:none;margin:16px auto 0;padding:10px 36px;background:var(--pri);color:var(--white);border:none;border-radius:24px;font-family:inherit;font-size:.92rem;cursor:pointer}
        .nbtn.on{display:block}
        .rc{background:var(--white);border-radius:14px;padding:36px 20px;text-align:center;box-shadow:var(--sh)}
        .rs{font-size:3.5rem;font-weight:700;color:var(--pri)}.rs span{font-size:1.3rem}
        .rl{font-size:1rem;color:var(--gray);margin:8px 0 16px}
        .rp{display:inline-block;padding:6px 24px;border-radius:24px;font-weight:700;font-size:1rem;margin-bottom:16px}
        .rp.pass{background:#e8f5e9;color:var(--ok)}.rp.fail{background:#ffebee;color:var(--ng)}
        .rbtn{padding:10px 36px;background:var(--acc);color:var(--white);border:none;border-radius:24px;font-family:inherit;font-size:.95rem;cursor:pointer;margin-top:8px}
        /* Links */
        .lc{background:var(--white);border-radius:10px;padding:18px;margin-bottom:12px;box-shadow:var(--sh)}
        .lc h3{color:var(--pri);font-size:.95rem;margin-bottom:4px}
        .lc p{font-size:.8rem;color:var(--gray);margin-bottom:8px}
        .lc a{color:var(--acc);font-weight:500;text-decoration:none;border-bottom:1px solid var(--acc);font-size:.82rem}
        .badge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:.65rem;font-weight:700;margin-left:6px}
        .b-free{background:#e8f5e9;color:var(--ok)}.b-off{background:#e3f2fd;color:#1565c0}.b-app{background:#f3e5f5;color:#7b1fa2}.b-new{background:#fff3e0;color:#e65100}
        /* Info */
        .ib{background:var(--white);border-radius:10px;padding:18px;margin-bottom:16px;box-shadow:var(--sh)}
        .ib h3{color:var(--pri);font-size:1rem;margin-bottom:10px;border-left:4px solid var(--acc);padding-left:8px}
        .ib table{width:100%;border-collapse:collapse;font-size:.82rem}
        .ib th,.ib td{padding:8px 10px;text-align:left;border-bottom:1px solid #eee}
        .ib th{background:var(--bg);font-weight:600;color:var(--pri);white-space:nowrap}
        .hr{color:var(--ng);font-weight:700}
        /* Modal */
        .mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
        .mo.on{display:flex}
        .mc{background:var(--white);border-radius:14px;padding:24px;max-width:360px;width:90%;text-align:center}
        .mc h3{color:var(--pri);margin:10px 0 4px}.mc .me{color:var(--gray);font-size:.82rem;margin-bottom:10px}
        .mc p{font-size:.85rem;line-height:1.7}
        .mcl{margin-top:14px;padding:8px 24px;background:var(--pri);color:var(--white);border:none;border-radius:16px;cursor:pointer;font-family:inherit}
        footer{text-align:center;padding:24px 14px;color:var(--gray);font-size:.72rem;line-height:1.6}
        @media(max-width:400px){.sg{grid-template-columns:repeat(3,1fr);gap:6px}.sign{width:50px;height:50px}.sc .sn{font-size:.6rem}.tab{font-size:.7rem;padding:10px 4px}}
    </style>
</head>
<body>

</div>

<!-- Tab 4: Links -->
<div id="tc-links" class="tc">

    <div id="lk-list"></div>
</div>

<!-- Tab 5: Info -->
<div id="tc-info" class="tc">
    <div class="qh"><h2 id="if-title"></h2><p id="if-desc"></p></div>
    <div id="if-content"></div>
</div>
</div>

<div class="mo" id="modal"><div class="mc" id="modal-c"></div></div>

<footer id="ft"></footer>

{q:{ja:"高速道路で時速100キロで走行するとき、車間距離は100メートル以上が目安。",zh:"在高速公路以100km/h行驶时，车间距应保持100米以上。",en:"At 100 km/h on expressways, keep at least 100m following distance.",vi:"Tren cao toc 100km/h, giu khoang cach 100m.",pt:"A 100 km/h, manter 100m de distancia.",ko:"고속도로 100km/h 주행 시 차간거리 100m 이상."},a:true,exp:{ja:"速度(km/h)と同じ数値(m)以上の車間距離が目安です。",zh:"车间距(m)应不少于速度(km/h)的数值。",en:"Following distance (m) should match speed (km/h).",vi:"Khoang cach (m) bang so toc do (km/h).",pt:"Distancia (m) deve igualar velocidade (km/h).",ko:"속도(km/h)와 같은 수치(m) 이상 차간거리."}},
{q:{ja:"後方から追越しをしようとする車があるときは、速度を上げて追越しをさせないようにする。",zh:"后方有车要超车时，应加速不让其超车。",en:"When a car behind tries to overtake, speed up to prevent it.",vi:"Khi xe phia sau muon vuot, tang toc de khong cho vuot.",pt:"Quando um carro atras tenta ultrapassar, acelere para impedir.",ko:"후방에서 추월하려는 차가 있으면 속도를 올려 추월을 막는다."},a:false,exp:{ja:"追越しをしようとする車には左に寄って道を譲ります。",zh:"应靠左让路给要超车的车辆。",en:"Move left and give way to overtaking vehicles.",vi:"Di sang trai va nhuong duong cho xe vuot.",pt:"Mova-se para a esquerda e de passagem.",ko:"추월하려는 차에게 좌측으로 비켜 양보합니다."}},
{q:{ja:"故障で高速道路に停車するときは、車の後方に停止表示器材を置く。",zh:"因故障在高速公路停车时，要在车后放置停车警示器材。",en:"When stopping on an expressway due to breakdown, place a warning device behind the car.",vi:"Khi dung tren cao toc do hong, phai dat bien canh bao phia sau.",pt:"Ao parar na rodovia por pane, coloque triangulo atras.",ko:"고장으로 고속도로 정차 시 정지표시기재를 차 뒤에 설치."},a:true,exp:{ja:"高速道路での停車時は停止表示器材の設置が義務です。",zh:"高速公路停车时必须设置停车警示器材。",en:"Warning devices are mandatory when stopped on expressways.",vi:"Bat buoc dat bien canh bao khi dung tren cao toc.",pt:"Triangulo obrigatorio ao parar na rodovia.",ko:"고속도로 정차 시 정지표시기재 설치 의무."}},
{q:{ja:"高速道路の路側帯は、疲れたときに停車して休憩してもよい。",zh:"高速公路的路肩可以在疲劳时停车休息。",en:"You may stop and rest on the expressway shoulder when tired.",vi:"Co the dung nghi tren le duong cao toc khi met.",pt:"Pode parar e descansar no acostamento da rodovia.",ko:"고속도로 노측대에서 피곤할 때 정차하여 휴식해도 된다."},a:false,exp:{ja:"路側帯は駐停車禁止。サービスエリアで休憩してください。",zh:"路肩禁止停车。请到服务区休息。",en:"Shoulder is no-stopping zone. Use service areas to rest.",vi:"Le duong cam dung xe. Hay nghi o tram dich vu.",pt:"Acostamento e proibido. Use areas de servico.",ko:"노측대는 주정차 금지. 서비스 에리어에서 휴식."}},
{q:{ja:"交通整理の行われていない交差点では、道幅が同じなら左方から来る車が優先。",zh:"在没有交通管制的路口，路幅相同时左方来车优先。",en:"At uncontrolled intersections with equal roads, vehicles from the left have priority.",vi:"O nga tu khong co tin hieu, xe tu ben trai uu tien.",pt:"Em cruzamentos sem sinalizacao, veiculo da esquerda tem prioridade.",ko:"교통정리 없는 교차로에서 도로 폭 같으면 좌방 우선."},a:true,exp:{ja:"道幅が同じ交差点では「左方優先」のルールがあります。",zh:"路幅相同的路口适用"左方优先"规则。",en:"The 'left-side priority' rule applies at equal-width intersections.",vi:"Quy tac 'uu tien ben trai' ap dung o nga tu co be rong bang nhau.",pt:"Regra de prioridade a esquerda em cruzamentos iguais.",ko:"도로 폭 같은 교차로에서는 '좌방우선' 규칙."}},
{q:{ja:"対向車があっても、右折する場合は直進車より優先して通行できる。",zh:"即使有对向车，右转时也可以优先于直行车通行。",en:"Even with oncoming traffic, right-turning vehicles have priority over straight-going ones.",vi:"Ke ca co xe nguoc chieu, xe re phai van uu tien hon xe di thang.",pt:"Mesmo com trafego oposto, veiculos virando a direita tem prioridade.",ko:"대향차가 있어도 우회전 시 직진차보다 우선 통행 가능."},a:false,exp:{ja:"右折車は直進車・左折車に道を譲らなければなりません。",zh:"右转车必须让直行车和左转车先行。",en:"Right-turning vehicles must yield to straight and left-turning traffic.",vi:"Xe re phai phai nhuong duong cho xe di thang va re trai.",pt:"Veiculos virando a direita devem ceder passagem.",ko:"우회전 차는 직진차·좌회전차에 양보해야 합니다."}},
{q:{ja:"歩行者が横断歩道の途中で立ち止まっていたら、注意しながらそのまま通過してよい。",zh:"行人在人行横道中途停下时，可以注意通过。",en:"If a pedestrian stops in the middle of a crossing, you may pass carefully.",vi:"Neu nguoi di bo dung giua vach sang duong, co the di qua can than.",pt:"Se um pedestre parar no meio da faixa, pode passar com cuidado.",ko:"보행자가 횡단보도 중간에 서 있으면 주의하며 통과해도 된다."},a:false,exp:{ja:"歩行者がいる場合は必ず一時停止して優先させます。",zh:"有行人时必须停车让行人优先。",en:"You must stop and yield to pedestrians on crossings.",vi:"Phai dung lai va nhuong duong cho nguoi di bo.",pt:"Deve parar e dar passagem ao pedestre.",ko:"보행자가 있으면 반드시 일시정지하여 우선시킵니다."}},
{q:{ja:"原動機付自転車は二人乗りをすることができない。",zh:"助力车（50cc以下）不可以载人。",en:"Mopeds (50cc or less) cannot carry passengers.",vi:"Xe gan may 50cc khong duoc cho them nguoi.",pt:"Ciclomotores 50cc nao podem levar passageiros.",ko:"원동기 부착 자전거는 2인 승차 불가."},a:true,exp:{ja:"50cc以下の原付は乗車定員1名です。",zh:"50cc以下助力车定员1人。",en:"Mopeds under 50cc have a capacity of 1 rider only.",vi:"Xe gan may duoi 50cc chi cho 1 nguoi.",pt:"Ciclomotores abaixo de 50cc: 1 pessoa apenas.",ko:"50cc 이하 원부는 정원 1명."}},
{q:{ja:"車を運転するときは、走行前に日常点検を行ったほうがよい。",zh:"驾车前应进行日常检查。",en:"You should perform daily checks before driving.",vi:"Nen kiem tra hang ngay truoc khi lai xe.",pt:"Deve fazer verificacoes diarias antes de dirigir.",ko:"운전 전 일상점검을 하는 것이 좋다."},a:true,exp:{ja:"日常点検は安全運転の基本です。",zh:"日常检查是安全驾驶的基本。",en:"Daily checks are fundamental to safe driving.",vi:"Kiem tra hang ngay la co ban cua lai xe an toan.",pt:"Verificacoes diarias sao essenciais.",ko:"일상점검은 안전운전의 기본."}},
{q:{ja:"夜間走行中は近くに注意を集中し、手元をよく見て運転したほうが安全。",zh:"夜间行驶时应集中注意近处，看好手边开车更安全。",en:"At night, focus on nearby objects and drive looking at your hands.",vi:"Ban dem nen tap trung nhin gan va lai xe nhin tay.",pt:"A noite, foque em objetos proximos.",ko:"야간 주행 시 가까운 곳에 집중하면 안전하다."},a:false,exp:{ja:"夜間はできるだけ遠くを見て前方の状況を早めに把握します。",zh:"夜间应尽量远看，提前掌握前方情况。",en:"At night, look as far ahead as possible to detect situations early.",vi:"Ban dem nen nhin xa nhat co the.",pt:"A noite, olhe o mais longe possivel.",ko:"야간에는 가능한 멀리 보아 전방 상황을 파악."}},
{q:{ja:"速度が速くなるほど、近くのものは見えにくくなる。",zh:"速度越快，越难看清近处的东西。",en:"The faster you go, the harder it is to see nearby objects.",vi:"Cang nhanh cang kho nhin thay vat gan.",pt:"Quanto mais rapido, mais dificil ver objetos proximos.",ko:"속도가 빠를수록 가까운 것은 보기 어렵다."},a:true,exp:{ja:"速度が上がると視野が狭くなり近くの物が見えにくくなります。",zh:"速度提高会使视野变窄，近处的东西变得难以看见。",en:"Higher speed narrows your field of vision (tunnel vision).",vi:"Toc do cao lam hep tam nhin.",pt:"Velocidade alta reduz o campo de visao.",ko:"속도가 올라가면 시야가 좁아져 근처 물체가 보기 어렵습니다."}},
{q:{ja:"荷物が方向指示器やブレーキランプを覆っても、確認すれば問題ない。",zh:"即使货物遮住了转向灯和刹车灯，只要确认就没问题。",en:"Even if cargo covers indicators or brake lights, it's OK if you check carefully.",vi:"Ke ca hang hoa che den xi nhan, neu kiem tra ky la duoc.",pt:"Mesmo se carga cobrir as luzes, tudo bem se verificar.",ko:"화물이 방향지시등을 가려도 확인하면 문제없다."},a:false,exp:{ja:"灯火類が見えない状態での運転は禁止です。",zh:"灯光被遮挡的状态下禁止驾驶。",en:"Driving with obscured lights is prohibited.",vi:"Cam lai xe khi den bi che khuat.",pt:"Proibido dirigir com luzes obstruidas.",ko:"등화류가 보이지 않는 상태의 운전은 금지."}},
{q:{ja:"高速道路では、やむを得ない場合でも後退してはならない。",zh:"在高速公路上，即使不得已也不可以倒车。",en:"On expressways, reversing is prohibited even in unavoidable situations.",vi:"Tren cao toc, cam lui xe ke ca truong hop bat kha khang.",pt:"Em rodovias, dar re e proibido mesmo em emergencias.",ko:"고속도로에서는 부득이한 경우에도 후진 금지."},a:true,exp:{ja:"高速道路での後退は禁止です。",zh:"高速公路禁止倒车。",en:"Reversing on expressways is always prohibited.",vi:"Cam lui xe tren cao toc.",pt:"Proibido dar re em rodovias.",ko:"고속도로 후진 금지."}},
{q:{ja:"バス停に停車していたバスが発進の合図をしたとき、後方の車はバスの発進を妨げてはならない。",zh:"公交车在站点发出起步信号时，后方车辆不得妨碍其起步。",en:"When a bus at a stop signals to depart, vehicles behind must not obstruct it.",vi:"Khi xe buyt phat tin hieu xuat phat, xe phia sau khong duoc can tro.",pt:"Quando onibus sinaliza partida, veiculos atras nao devem impedir.",ko:"버스 정류장에서 버스가 발진 신호를 내면 후방 차는 방해 불가."},a:true,exp:{ja:"路線バスの発進を妨害してはいけません。",zh:"不得妨碍公交车起步。",en:"Do not obstruct bus departures.",vi:"Khong duoc can tro xe buyt xuat phat.",pt:"Nao obstrua a partida de onibus.",ko:"노선 버스 발진 방해 금지."}},
{q:{ja:"山道で行き違うとき、がけ側の車が一時停止して谷側の車に道を譲る。",zh:"在山路会车时，靠悬崖一侧的车停车让靠山谷一侧的车先行。",en:"On mountain roads, the car on the cliff side should stop and yield to the valley side car.",vi:"Tren duong nui, xe phia vuc dung lai nhuong xe phia nui.",pt:"Em estradas de montanha, o carro do lado do precipicio cede passagem.",ko:"산길에서 행갈림 시 절벽 쪽 차가 정지하고 골짜기 쪽 차에 양보."},a:false,exp:{ja:"谷側の車が停止してがけ側の車に道を譲ります。",zh:"靠山谷一侧的车应停车让靠悬崖一侧的车先行。",en:"The valley-side car stops and yields to the cliff-side car.",vi:"Xe phia thung lung dung lai nhuong xe phia vach da.",pt:"O carro do lado do vale cede passagem ao do precipicio.",ko:"골짜기 쪽 차가 정지하여 절벽 쪽 차에 양보."}},
{q:{ja:"荷物を多く積んだ車は、空車のときよりも制動距離が短くなる。",zh:"装载很多货物的车比空车的制动距离更短。",en:"A heavily loaded vehicle has a shorter braking distance than an empty one.",vi:"Xe cho nang co quang duong phanh ngan hon xe trong.",pt:"Veiculo carregado tem distancia de frenagem menor.",ko:"화물을 많이 실은 차는 공차보다 제동거리가 짧다."},a:false,exp:{ja:"荷物が重いほど制動距離は長くなります。",zh:"载重越重，制动距离越长。",en:"Heavier loads mean longer braking distances.",vi:"Xe cang nang, quang duong phanh cang dai.",pt:"Cargas mais pesadas = maior distancia de frenagem.",ko:"화물이 무거울수록 제동거리가 길어집니다."}},
{q:{ja:"ブレーキをかけてから車が停止するまでの間は、空走距離と制動距離がある。",zh:"从踩刹车到车停下，包括空走距离和制动距离。",en:"From braking to stopping, there is reaction distance and braking distance.",vi:"Tu luc phanh den khi dung co quang duong phan xa va phanh.",pt:"Da frenagem a parada: distancia de reacao + frenagem.",ko:"브레이크부터 정지까지 공주거리와 제동거리가 있다."},a:true,exp:{ja:"停止距離＝空走距離＋制動距離です。",zh:"停车距离=空走距离+制动距离。",en:"Stopping distance = reaction distance + braking distance.",vi:"Quang duong dung = phan xa + phanh.",pt:"Distancia de parada = reacao + frenagem.",ko:"정지거리 = 공주거리 + 제동거리."}},
{q:{ja:"赤信号でも左折の青矢印が出ていれば、軽車両も左折できる。",zh:"红灯时如果有左转绿色箭头，轻型车辆也可以左转。",en:"At a red light with a green left-turn arrow, light vehicles can also turn left.",vi:"Den do nhung co mui ten xanh re trai, xe nhe cung duoc re trai.",pt:"No vermelho com seta verde a esquerda, veiculos leves podem virar.",ko:"적신호에서 좌회전 청색 화살표가 나오면 경차량도 좌회전 가능."},a:false,exp:{ja:"青矢印信号では軽車両は進行できません。",zh:"绿色箭头信号时轻型车辆不能通行。",en:"Light vehicles (bicycles etc.) cannot proceed on arrow signals.",vi:"Xe nhe khong duoc di theo den mui ten xanh.",pt:"Veiculos leves nao podem seguir na seta verde.",ko:"청색 화살표 신호에서 경차량은 진행 불가."}},
];

// ========== Render Functions ==========
function drawSign(s, big){
    const cls = big ? 'sign sign-big' : 'sign';
    const t = s.type;
    if(t==='c'){
        let extra = '';
        if(s.slash) extra = '<div style="position:absolute;width:'+(big?'70':'42')+'px;height:3px;background:#d32f2f;transform:rotate(-45deg)"></div>';
        if(s.cross) extra = '<div style="position:absolute;width:'+(big?'70':'42')+'px;height:3px;background:#d32f2f;transform:rotate(-45deg)"></div><div style="position:absolute;width:'+(big?'70':'42')+'px;height:3px;background:#d32f2f;transform:rotate(45deg)"></div>';
        return `<div class="${cls} sign-circle"><span class="sign-inner" style="font-size:${big?'1.4rem':'.8rem'}">${s.icon}</span>${extra}</div>`;
    }
    if(t==='cb') return `<div class="${cls} sign-circle-blue"><span class="sign-inner-w" style="font-size:${big?'1.4rem':'.8rem'}">${s.icon}</span></div>`;
    if(t==='cf') return `<div class="${cls} sign-circle-red-fill"><span class="sign-inner-w" style="font-size:${big?'1.8rem':'1.2rem'}">${s.icon}</span></div>`;
    if(t==='tri'){
        return `<div style="width:${big?'80':'56'}px;height:${big?'72':'50'}px;margin:0 auto;position:relative"><div style="width:0;height:0;border-left:${big?'40':'28'}px solid transparent;border-right:${big?'40':'28'}px solid transparent;border-top:${big?'70':'48'}px solid #d32f2f;position:relative"><span style="position:absolute;top:${big?'-55':'-38'}px;left:50%;transform:translateX(-50%);color:#fff;font-size:${big?'.8':'.5'}rem;font-weight:700;white-space:nowrap">${s.icon}</span></div></div>`;
    }
    if(t==='d'){
        return `<div style="width:${big?'64':'44'}px;height:${big?'64':'44'}px;background:#f9a825;border:3px solid #f57f17;transform:rotate(45deg);display:flex;align-items:center;justify-content:center;margin:${big?'10':'6'}px auto"><span style="transform:rotate(-45deg);font-size:${big?'1.2':'.6'}rem;text-align:center;line-height:1.1">${s.icon}</span></div>`;
    }
    if(t==='rect') return `<div class="${cls} sign-rect" style="font-size:${big?'1.2':'.65'}rem">${s.icon}</div>`;
    if(t==='rg') return `<div class="${cls} sign-rect-green" style="font-size:${big?'1':'.55'}rem">${s.icon}</div>`;
    if(t==='aux') return `<div class="${cls} sign-aux" style="font-size:${big?'.75':'.45'}rem;white-space:pre-line">${s.icon}</div>`;
    return `<div class="${cls}">${s.icon}</div>`;
}

function renderGallery(){
    const cats = [{k:'reg',el:'sg-reg',tl:'cat-reg',ci:0},{k:'warn',el:'sg-warn',tl:'cat-warn',ci:1},{k:'inst',el:'sg-inst',tl:'cat-inst',ci:2},{k:'guide',el:'sg-guide',tl:'cat-guide',ci:3},{k:'aux',el:'sg-aux',tl:'cat-aux',ci:4}];
    cats.forEach(c=>{
        document.getElementById(c.tl).textContent = t('cats')[c.ci];
        const el = document.getElementById(c.el);
        el.innerHTML = signs[c.k].map(s=>`<div class="sc" onclick="showSign('${c.k}','${s.id}')">${drawSign(s)}<div class="sn">${s.n[lang]||s.n.ja}</div></div>`).join('');
    });
}

function showSign(cat,id){
    const s = signs[cat].find(x=>x.id===id);
    if(!s) return;
    const mc = document.getElementById('modal-c');
    mc.innerHTML = `${drawSign(s,true)}<h3>${s.n[lang]||s.n.ja}</h3><div class="me">${s.n.en||''}</div><p>${s.d[lang]||s.d.ja}</p><button class="mcl" onclick="document.getElementById('modal').classList.remove('on')">${t('close')}</button>`;
    document.getElementById('modal').classList.add('on');
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.target.classList.remove('on');});

// ========== Sign Quiz ==========
let sq={qs:[],ci:0,sc:0};
const allSigns=[...signs.reg,...signs.warn,...signs.inst,...signs.guide];

function startSignQuiz(){
    const pool=[...signs.reg,...signs.warn,...signs.inst].sort(()=>Math.random()-.5).slice(0,10);
    sq={qs:[],ci:0,sc:0};
    pool.forEach(cs=>{
        const wrong=allSigns.filter(s=>s.id!==cs.id).sort(()=>Math.random()-.5).slice(0,3);
        const opts=[cs,...wrong].sort(()=>Math.random()-.5);
        sq.qs.push({sign:cs,opts,ci:opts.indexOf(cs)});
    });
    renderSQ();
}
function renderSQ(){
    const a=document.getElementById('sq-area');
    if(sq.ci>=sq.qs.length){
        const p=Math.round(sq.sc/sq.qs.length*100);
        a.innerHTML=`<div class="rc"><div class="rs">${sq.sc}<span>/${sq.qs.length}</span></div><div class="rl">${t('score')}: ${p}%</div><div class="rp ${p>=90?'pass':'fail'}">${p>=90?t('pass'):t('fail')}</div><br><button class="rbtn" onclick="startSignQuiz()">${t('retry')}</button></div>`;
        return;
    }
    const q=sq.qs[sq.ci], lb=['A','B','C','D'];
    document.getElementById('sq-scr').textContent=`${sq.sc} ${t('correct')}`;
    document.getElementById('sq-num').textContent=`${sq.ci+1}/${sq.qs.length}`;
    document.getElementById('sq-bar').style.width=`${sq.ci/sq.qs.length*100}%`;
    a.innerHTML=`<div class="qc"><span class="qn">${sq.ci+1}</span><div class="qi">${drawSign(q.sign,true)}</div><div class="qt">${t('qWhat')}</div><div class="opts">${q.opts.map((o,i)=>`<button class="ob" onclick="ansSQ(${i},${q.ci})" id="sqo${i}"><span class="ol">${lb[i]}</span><span>${o.n[lang]||o.n.ja}</span></button>`).join('')}</div><div class="exp" id="sqExp">${q.sign.d[lang]||q.sign.d.ja}</div><button class="nbtn" id="sqN" onclick="sq.ci++;renderSQ()">${t('next')}</button></div>`;
}
function ansSQ(sel,qi){
    const q=sq.qs[qi];
    document.querySelectorAll('[id^=sqo]').forEach(b=>b.disabled=true);
    document.getElementById('sqo'+q.ci).classList.add('ok');
    if(sel===q.ci) sq.sc++; else document.getElementById('sqo'+sel).classList.add('ng');
    document.getElementById('sqExp').classList.add('on');
    document.getElementById('sqN').classList.add('on');
    document.getElementById('sq-scr').textContent=`${sq.sc} ${t('correct')}`;
}

// ========== 50Q Mock ==========
let mq={qs:[],ci:0,sc:0};
function start50(mode){
    document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('on'));
    if(event&&event.target) event.target.classList.add('on');
    let qs=[...MQ].sort(()=>Math.random()-.5);
    if(mode==='25') qs=qs.slice(0,25);
    if(mode==='10') qs=qs.slice(0,10);
    mq={qs,ci:0,sc:0};
    renderMQ();
}
function renderMQ(){
    const a=document.getElementById('mq-area'),total=mq.qs.length;
    if(mq.ci>=total){
        const p=Math.round(mq.sc/total*100),pl=Math.ceil(total*.9);
        a.innerHTML=`<div class="rc"><div class="rs">${mq.sc}<span>/${total}</span></div><div class="rl">${t('score')}: ${p}% (${t('passLine')}: ${pl}/${total})</div><div class="rp ${mq.sc>=pl?'pass':'fail'}">${mq.sc>=pl?t('pass'):t('fail')}</div><br><button class="rbtn" onclick="start50('all')">${t('retry')}</button></div>`;
        return;
    }
    const q=mq.qs[mq.ci];
    document.getElementById('mq-scr').textContent=`${mq.sc} ${t('correct')}`;
    document.getElementById('mq-num').textContent=`${mq.ci+1}/${total}`;
    document.getElementById('mq-bar').style.width=`${mq.ci/total*100}%`;
    a.innerHTML=`<div class="qc"><span class="qn">${mq.ci+1}</span><div class="qt">${q.q[lang]||q.q.ja}</div><div class="opts"><button class="ob" onclick="ansMQ(true,${mq.ci})" id="mqT"><span class="ol">O</span><span>${t('trueL')}</span></button><button class="ob" onclick="ansMQ(false,${mq.ci})" id="mqF"><span class="ol">X</span><span>${t('falseL')}</span></button></div><div class="exp" id="mqExp">${q.exp[lang]||q.exp.ja}</div><button class="nbtn" id="mqN" onclick="mq.ci++;renderMQ()">${t('next')}</button></div>`;
}
function ansMQ(sel,qi){
    const q=mq.qs[qi];
    document.getElementById('mqT').disabled=true;
    document.getElementById('mqF').disabled=true;
    document.getElementById(q.a?'mqT':'mqF').classList.add('ok');
    if(sel===q.a) mq.sc++; else document.getElementById(sel?'mqT':'mqF').classList.add('ng');
    document.getElementById('mqExp').classList.add('on');
    document.getElementById('mqN').classList.add('on');
    document.getElementById('mq-scr').textContent=`${mq.sc} ${t('correct')}`;
}
